---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch.miracle.dev
  resources:
  - scaledjobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch.miracle.dev
  resources:
  - scaledjobs/finalizers
  verbs:
  - update
- apiGroups:
  - batch.miracle.dev
  resources:
  - scaledjobs/status
  verbs:
  - get
  - patch
  - update
